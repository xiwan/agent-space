<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Space</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; height: 100vh; overflow: hidden; }
    #game { flex: 0 0 480px; height: 100vh; display: flex; align-items: center; justify-content: center; }
    #logs {
      flex: 1; height: 100vh; overflow-y: auto; padding: 12px;
      font-family: monospace; font-size: 13px; color: #ccc;
      border-left: 1px solid #333;
    }
    #logs::-webkit-scrollbar { width: 6px; }
    #logs::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    .log-entry { padding: 6px 8px; border-bottom: 1px solid #2a2a3e; line-height: 1.4; }
    .log-entry:hover { background: #2a2a3e; }
    .log-agent { color: #66ccff; font-weight: bold; }
    .log-time { color: #666; font-size: 11px; }
    .log-silent { color: #555; font-style: italic; }
    .log-response { color: #ddd; }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="logs"><div style="color:#555;padding:8px">Waiting for logs...</div></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
