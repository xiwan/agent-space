<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summit Demo — AI Room Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e0e0e0; font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    header h1 { font-size: 16px; color: #7fdbca; white-space: nowrap; }
    #prompt-input { flex: 1; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; color: #e0e0e0; font-family: monospace; font-size: 14px; border-radius: 6px; }
    #prompt-input:focus { outline: none; border-color: #4ade80; }
    #generate-btn { padding: 8px 16px; background: #4ade80; color: #000; border: none; font-family: monospace; font-weight: bold; font-size: 13px; cursor: pointer; border-radius: 6px; }
    #generate-btn:hover { background: #22c55e; }
    #status { font-size: 12px; color: #888; padding: 4px 20px; flex-shrink: 0; min-height: 20px; }
    #canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 20px; position: relative; }
    #demo-canvas { image-rendering: pixelated; image-rendering: crisp-edges; border: 1px solid #30363d; }
    #usage-panel { display: none; position: fixed; bottom: 16px; right: 16px; background: rgba(0,0,0,0.9); border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; font-size: 12px; color: #7fdbca; line-height: 1.6; }
    a.back { color: #666; text-decoration: none; font-size: 13px; }
    a.back:hover { color: #4ade80; }
  </style>
</head>
<body>
  <header>
    <a class="back" href="/">← Office</a>
    <h1>🎮 AI Room Generator</h1>
    <input id="prompt-input" type="text" placeholder="描述一个房间... 例如: 一个废弃的赛博朋克办公室" />
    <input id="seed-input" type="number" value="" min="1" max="9999" style="width:60px; padding:6px 8px; background:#0d1117; border:1px solid #30363d; color:#4ade80; font-family:monospace; font-size:13px; border-radius:4px; text-align:center;" title="种子（留空随机）" placeholder="随机" />
    <button id="generate-btn">生成</button>
    <input id="token-input" type="password" placeholder="Token" style="width:80px; padding:6px 8px; background:#0d1117; border:1px solid #30363d; color:#e0e0e0; font-family:monospace; font-size:11px; border-radius:4px;" />
  </header>
  <div id="status"></div>
  <div id="canvas-wrap">
    <canvas id="demo-canvas"></canvas>
  </div>
  <div id="usage-panel"></div>
  <script type="module" src="/src/demo/demo-main.js"></script>
</body>
</html>
