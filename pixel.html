<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pixel Office — ACP Bridge Agents</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    #pixelApp {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh; /* iOS Safari: 排除浏览器工具栏的动态视口 */
    }

    #pixelHeader {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      font-size: 13px;
      flex-shrink: 0;
    }

    #pixelHeader h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    #pixelHeader .spacer { flex: 1; }

    #pixelHeader a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 12px;
    }

    #pixelBgSelect {
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    #pixelBgSelect:hover { border-color: #64748b; }
    #pixelBgSelect:focus { outline: none; border-color: #60a5fa; }

    /* === v2.4.0: edit button + toolbar === */
    #pixelEditBtn,
    #pixelStartBtn {
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 4px 10px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    #pixelEditBtn:hover, #pixelStartBtn:hover { border-color: #64748b; }
    #pixelEditBtn.active {
      background: #facc15;
      color: #000;
      border-color: #facc15;
    }
    /* v2.5.0: Pause 状态视觉 (running 时按钮显示 "⏸ Pause" + 绿色) */
    #pixelStartBtn.active {
      background: #34d399;
      color: #000;
      border-color: #34d399;
    }

    #pixelEditToolbar {
      display: none;
      position: absolute;
      right: 16px;
      top: 16px;
      width: 260px;
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 12px;
      font-family: monospace;
      font-size: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      z-index: 20;
    }
    #pixelEditToolbar .me-title {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #facc15;
      margin-bottom: 10px;
    }
    #pixelEditToolbar .me-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    #pixelEditToolbar .me-label {
      font-size: 10px;
      color: #94a3b8;
      width: 50px;
      text-transform: uppercase;
    }
    #pixelEditToolbar .me-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1;
    }
    #pixelEditToolbar .me-tool-btn {
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 3px;
      padding: 3px 6px;
      cursor: pointer;
      font-size: 11px;
      font-family: monospace;
    }
    #pixelEditToolbar .me-tool-btn:hover { border-color: #64748b; }
    #pixelEditToolbar .me-tool-btn.active {
      background: #60a5fa;
      color: #000;
      border-color: #60a5fa;
    }
    /* v2.4.1: eraser 视觉与 paint 区分 */
    #pixelEditToolbar .me-tool-btn[data-tool="eraser"].active {
      background: #fda4af;
      color: #000;
      border-color: #fda4af;
    }
    #pixelEditToolbar .me-agent {
      flex: 1;
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 3px;
      padding: 3px 6px;
      font-family: monospace;
      font-size: 11px;
    }
    #pixelEditToolbar .me-actions {
      display: flex;
      gap: 4px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    #pixelEditToolbar .me-btn {
      flex: 1;
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 3px;
      padding: 5px 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
    }
    #pixelEditToolbar .me-btn:hover { border-color: #64748b; }
    #pixelEditToolbar .me-save:hover { background: #064e3b; }
    #pixelEditToolbar .me-reset:hover { background: #7f1d1d; }
    #pixelEditToolbar .me-hint {
      font-size: 10px;
      color: #64748b;
      margin-top: 8px;
      text-align: center;
    }

    #pixelStatus {
      font-size: 12px;
      color: #94a3b8;
      font-family: monospace;
    }
    #pixelStatus[data-kind="ok"]    { color: #34d399; }
    #pixelStatus[data-kind="error"] { color: #f87171; }

    /* === main: 横向 flex (canvas + sidebar) === */
    #pixelMain {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #pixelStage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f1c;
      overflow: hidden;
      position: relative;  /* v2.4.0: anchor for #pixelEditToolbar absolute */
    }

    #pixelCanvas {
      max-width: 100%;
      max-height: 100%;
      width: 960px;
      height: 800px;
      aspect-ratio: 6 / 5;  /* v2.8.0: 窄屏缩放时维持原比例 */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: pointer;
      box-shadow: 0 0 0 1px #334155, 0 8px 32px rgba(0,0,0,0.5);
    }

    /* === sidebar: 320px tabbed 面板 (v2.10.0) === */
    #pixelSidebar {
      width: 320px;
      background: #0f172a;
      border-left: 1px solid #334155;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      min-width: 200px;
      max-width: 70vw;
    }
    #sidebarResizer {
      width: 5px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      position: relative;
    }
    #sidebarResizer:hover, #sidebarResizer.dragging {
      background: #3b82f6;
    }

    .sidebar-tabs {
      display: flex;
      gap: 0;
      flex-shrink: 0;
      border-bottom: 1px solid #334155;
    }
    .sidebar-tab {
      flex: 1;
      background: #0f172a;
      color: #94a3b8;
      border: 0;
      border-bottom: 2px solid transparent;
      padding: 8px 4px;
      font-family: monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .sidebar-tab:hover { color: #e2e8f0; }
    .sidebar-tab.active {
      color: #e2e8f0;
      border-bottom-color: #60a5fa;
    }

    .sidebar-agents,
    .sidebar-history,
    .sidebar-usage {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    /* v2.13.0: history wrap = toolbar + scroll list */
    .sidebar-history-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0; /* flexbox 让内部 .sidebar-history 能滚 */
    }
    .sidebar-history-wrap > .sidebar-history {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      padding-top: 6px;
    }
    .sidebar-history-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px 4px;
      flex-shrink: 0;
      border-bottom: 1px solid #1e293b;
    }
    .sidebar-history-count {
      font-size: 10px;
      color: #64748b;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .sidebar-history-clear {
      margin-left: auto;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
    }
    .sidebar-history-clear:hover {
      border-color: #f87171;
      color: #fca5a5;
    }
    .ch-truncated-note {
      color: #fbbf24 !important;
      background: #422006;
      padding: 3px 6px;
      border-radius: 3px;
      margin-top: 5px;
      font-size: 10px;
      font-style: normal !important;
    }

    .pixel-card {
      padding: 10px 12px;
      margin-bottom: 8px;
      background: #1e293b;
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 100ms, background 100ms;
    }
    .pixel-card:hover { background: #283548; }
    .pixel-card.selected {
      border-color: #fff;
      box-shadow: 0 0 0 1px #fff inset;
    }
    .pixel-card.offline { opacity: 0.5; }

    .pixel-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .pixel-card-name {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      word-break: break-all;
    }
    .pixel-card-desc {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-clamp: 2;
      overflow: hidden;
      line-height: 1.4;
    }
    .pixel-card-domains {
      font-size: 10px;
      color: #64748b;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* state badge — 复用 v2.1.0 配色 */
    .pixel-state {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .pixel-state-busy    { background: #064e3b; color: #6ee7b7; }
    .pixel-state-idle    { background: #374151; color: #d1d5db; }
    .pixel-state-offline { background: #1e293b; color: #64748b; }
    .pixel-state-error   { background: #7f1d1d; color: #fca5a5; }

    /* === Command Composer (v2.10.0) === */
    #pixelComposer {
      flex-shrink: 0;
      background: #0f172a;
      border-top: 1px solid #334155;
      padding: 10px 14px;
      font-family: monospace;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      /* v2.11.0 (B4): 整体高度限制, 防 textarea 拉太高挤扁 canvas */
      max-height: 35vh;
      overflow: auto;
    }

    /* === v2.14.0: Composer tab bar === */
    .composer-tabs {
      display: flex;
      gap: 0;
      flex-shrink: 0;
      margin-bottom: 6px;
    }
    .composer-tab {
      background: #0f172a;
      color: #94a3b8;
      border: 0;
      border-bottom: 2px solid transparent;
      padding: 5px 12px;
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      cursor: pointer;
    }
    .composer-tab:hover { color: #e2e8f0; }
    .composer-tab.active {
      color: #e2e8f0;
      border-bottom-color: #60a5fa;
    }
    .composer-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* === v2.14.0: Artifact Composer (Quick mode) === */
    .ac-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .ac-row-select { margin-bottom: 2px; }
    .ac-select {
      flex: 1;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    .ac-select:focus { outline: none; border-color: #60a5fa; }
    .ac-agents {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .ac-prompt {
      width: 100%;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 6px 8px;
      font-family: monospace;
      font-size: 12px;
      resize: vertical;
      min-height: 40px;
      max-height: 120px;
      box-sizing: border-box;
      line-height: 1.4;
    }
    .ac-prompt:focus { outline: none; border-color: #60a5fa; }
    .ac-row-actions { align-items: center; }
    .ac-status {
      font-size: 11px;
      color: #94a3b8;
    }
    .ac-status[data-kind="ok"]    { color: #34d399; }
    .ac-status[data-kind="error"] { color: #f87171; }
    .ac-empty { font-size: 11px; color: #64748b; font-style: italic; }
    .ac-steps { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; margin-bottom: 4px; }
    .ac-step-chip { font-size: 11px; color: #94a3b8; background: #1e293b; border: 1px solid #334155; border-radius: 3px; padding: 2px 6px; }
    .cc-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .cc-field {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 11px;
    }
    .cc-label {
      font-size: 10px;
      letter-spacing: 0.05em;
      color: #94a3b8;
      text-transform: uppercase;
    }
    .cc-mode, .cc-sync, .cc-max-turns {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    .cc-max-turns { width: 64px; }
    .cc-mode:focus, .cc-sync:focus, .cc-max-turns:focus { outline: none; border-color: #60a5fa; }
    .cc-sync:disabled, .cc-mode:disabled, .cc-max-turns:disabled { opacity: 0.4; cursor: not-allowed; }
    .cc-field-toggle {
      flex-direction: row;
      align-items: center;
    }
    .cc-field-toggle .cc-label { margin: 0; }

    .cc-row-agents { gap: 6px; }
    .cc-agents {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1;
    }
    .cc-agent {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      color: #cbd5e1;
    }
    .cc-agent:hover { border-color: #475569; }
    .cc-agent.active {
      background: #1e3a5f;
      color: #e2e8f0;
      border-color: #60a5fa;
    }
    .cc-agent input { margin: 0; cursor: pointer; }
    /* v2.11.0 (C1): state dot */
    .cc-agent-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 1px; /* 像素方块感, 不要圆 */
      flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4) inset;
    }
    /* v2.11.0 (C2): per-state visual */
    .cc-agent-offline { opacity: 0.55; }
    .cc-agent-error .cc-agent-name { color: #fca5a5; }
    .cc-agent-busy .cc-agent-name { color: #fde68a; }
    .cc-empty { font-size: 11px; color: #64748b; font-style: italic; }

    .cc-row-prompt {
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
    }
    .cc-prompt {
      width: 100%;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 6px 8px;
      font-family: monospace;
      font-size: 12px;
      resize: vertical;
      /* v2.11.0 (B1+B2): 默认 3 行, 自适应到 max 200px */
      min-height: 60px;
      max-height: 200px;
      box-sizing: border-box;
      line-height: 1.4;
    }
    .cc-prompt:focus { outline: none; border-color: #60a5fa; }
    /* v2.13.2: per-step ON 时大框降为次要角色 */
    .cc-prompt-secondary {
      opacity: 0.7;
      border-color: #334155;
    }
    .cc-prompt-secondary:focus {
      opacity: 1;
      border-color: #60a5fa;
    }
    .cc-prompt-secondary::placeholder {
      color: #64748b;
      font-style: italic;
    }
    .cc-step-prompts:not(:empty) {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-left: 8px;
      border-left: 2px solid #334155;
    }
    .cc-step {
      display: flex;
      align-items: flex-start; /* v2.11.0: textarea 多行时对齐 top */
      gap: 8px;
    }
    .cc-step-name {
      font-size: 11px;
      color: #94a3b8;
      min-width: 70px;
      padding-top: 5px; /* 对齐 textarea 第一行 */
    }
    .cc-step-prompt {
      flex: 1;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 11px;
      /* v2.11.0 (B3): textarea 自适应 (1 行起步, max 120px) */
      resize: vertical;
      min-height: 24px;
      max-height: 120px;
      box-sizing: border-box;
      line-height: 1.4;
    }
    .cc-step-prompt:focus { outline: none; border-color: #60a5fa; }

    .cc-row-actions {
      align-items: center;
    }
    .cc-status {
      font-size: 11px;
      color: #94a3b8;
    }
    .cc-status[data-kind="ok"]    { color: #34d399; }
    .cc-status[data-kind="error"] { color: #f87171; }
    .cc-spacer { flex: 1; }
    .cc-submit, .cc-reset {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 5px 12px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    .cc-submit:hover:not(:disabled), .cc-reset:hover { border-color: #64748b; }
    .cc-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .cc-submit:not(:disabled) {
      background: #1e3a5f;
      border-color: #60a5fa;
      color: #fff;
    }

    /* === History cards === */
    .ch-empty { font-size: 11px; color: #64748b; font-style: italic; padding: 8px 2px; }
    .ch-card {
      padding: 8px 10px;
      margin-bottom: 6px;
      background: #1e293b;
      border-left: 3px solid #475569;
      border-radius: 0 4px 4px 0;
      font-size: 11px;
    }
    .ch-card.ch-status-pending   { border-left-color: #94a3b8; }
    .ch-card.ch-status-running   { border-left-color: #60a5fa; animation: ch-pulse 1.5s infinite; }
    .ch-card.ch-status-succeeded { border-left-color: #34d399; }
    .ch-card.ch-status-failed    { border-left-color: #f87171; }
    @keyframes ch-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .ch-head {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ch-mode {
      font-weight: 600;
      color: #e2e8f0;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.05em;
    }
    .ch-head .ch-status {
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 3px;
      background: #0f172a;
      color: #94a3b8;
      text-transform: uppercase;
    }
    .ch-time {
      margin-left: auto;
      font-size: 10px;
      color: #64748b;
    }
    /* v2.11.1: server-reported duration */
    .ch-duration {
      font-size: 10px;
      color: #fbbf24;
      background: #422006;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 0.02em;
    }
    .ch-elapsed {
      font-size: 10px;
      color: #93c5fd;
      font-variant-numeric: tabular-nums;
    }
    .ch-cancel-btn {
      font-size: 9px;
      color: #fca5a5;
      background: #7f1d1d;
      border: 1px solid #991b1b;
      border-radius: 3px;
      padding: 1px 6px;
      cursor: pointer;
      margin-left: 4px;
    }
    .ch-cancel-btn:hover { background: #991b1b; }
    .ch-cancel-btn:disabled { opacity: 0.5; cursor: default; }
    /* v2.11.1: server-side error (业务错, 与 .ch-error 网络错区分) */
    .ch-error-server {
      background: #7f1d1d;
      color: #fecaca;
      padding: 4px 6px;
      border-radius: 3px;
      margin-top: 5px;
      font-size: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .ch-agents {
      color: #60a5fa;
      margin-top: 2px;
      font-size: 10px;
    }
    .ch-prompt {
      /* v2.10.0 legacy — replaced by .ch-prompt-block in v2.11.0, kept for back-compat */
      color: #cbd5e1;
      margin-top: 4px;
      line-height: 1.3;
    }
    .ch-meta { font-size: 10px; color: #64748b; margin-top: 2px; }
    .ch-error {
      margin-top: 4px;
      color: #f87171;
      font-size: 10px;
    }
    .ch-output {
      /* v2.10.0 legacy — kept for back-compat */
      margin-top: 6px;
    }
    .ch-output summary {
      font-size: 10px;
      color: #94a3b8;
      cursor: pointer;
      padding: 2px 0;
    }
    .ch-output pre {
      background: #0f172a;
      padding: 6px;
      margin-top: 4px;
      border-radius: 3px;
      font-size: 10px;
      max-height: 200px;
      overflow: auto;
      color: #cbd5e1;
    }

    /* === v2.11.0: prompt + conversation + raw blocks === */
    .ch-prompt-block, .ch-convo-block, .ch-raw-block {
      margin-top: 5px;
    }
    .ch-prompt-block > summary,
    .ch-convo-block > summary,
    .ch-raw-block > summary {
      font-size: 10px;
      color: #94a3b8;
      cursor: pointer;
      padding: 2px 0;
      list-style: none;
      user-select: none;
    }
    .ch-prompt-block > summary::-webkit-details-marker,
    .ch-convo-block > summary::-webkit-details-marker,
    .ch-raw-block > summary::-webkit-details-marker { display: none; }
    .ch-prompt-block[open] > summary,
    .ch-convo-block[open] > summary { color: #cbd5e1; }
    .ch-prompt-full {
      background: #0f172a;
      padding: 6px 8px;
      margin: 4px 0 0;
      border-radius: 3px;
      font-size: 11px;
      max-height: 180px;
      overflow: auto;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
    }
    .ch-turns {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ch-turn {
      background: #0f172a;
      border-left: 3px solid #475569;
      border-radius: 0 3px 3px 0;
      padding: 4px 8px;
    }
    .ch-turn-head {
      font-size: 10px;
      font-weight: 600;
      color: #60a5fa;
      letter-spacing: 0.03em;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .ch-turn-agent { color: #60a5fa; }
    /* v2.13.1: per-turn chips (turn / duration / status / winner) */
    .ch-turn-chip {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.02em;
      padding: 1px 6px;
      border-radius: 3px;
      background: #1e293b;
      color: #94a3b8;
    }
    .ch-turn-num { color: #cbd5e1; }
    .ch-turn-dur { color: #fbbf24; background: #422006; }
    .ch-turn-winner { color: #fde68a; background: #713f12; }
    .ch-step-status-pending  { color: #cbd5e1; background: #334155; }
    .ch-step-status-running  { color: #93c5fd; background: #1e3a5f; }
    .ch-step-status-failed   { color: #fecaca; background: #7f1d1d; }
    .ch-step-status-skipped  { color: #94a3b8; background: #1e293b; opacity: 0.7; }

    /* v2.13.1: conversation-level metadata chips (above turns) */
    .ch-meta-chips {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin: 4px 0 6px;
    }
    .ch-meta-chip {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      background: #1e293b;
      color: #cbd5e1;
    }
    .ch-meta-stop { color: #fca5a5; background: #422006; }
    .ch-meta-paused { color: #fbbf24; background: #422006; }
    .ch-turn-text {
      margin: 0;
      font-size: 11px;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
      max-height: 240px;
      overflow: auto;
    }
    .ch-artifact { margin-top: 4px; }
    .ch-artifact a, .ch-artifact-link { font-size: 11px; color: #60a5fa; text-decoration: none; margin-right: 8px; }
    .ch-artifact a:hover { text-decoration: underline; }
    .ch-artifact-empty { font-size: 11px; color: #64748b; font-style: italic; }
    /* v2.15: step_progress inline log */
    .ch-progress-block { margin: 4px 0; }
    .ch-progress-block summary { font-size: 10px; color: #94a3b8; cursor: pointer; }
    .ch-progress-log { font-size: 10px; line-height: 1.6; padding: 4px 0; display: flex; flex-direction: column; gap: 1px; max-height: 180px; overflow: auto; }
    .ch-prog-tool { color: #fbbf24; }
    .ch-prog-tool-completed { color: #34d399; }
    .ch-prog-tool-failed { color: #f87171; }
    .ch-prog-msg { color: #e2e8f0; }
    .ch-prog-think { color: #a78bfa; font-style: italic; }
    .ch-prog-status { color: #94a3b8; }
    .ch-step-prompt { margin: 4px 0; }
    .ch-step-prompt summary { font-size: 10px; color: #94a3b8; cursor: pointer; }
    .ch-step-prompt pre { font-size: 11px; color: #cbd5e1; white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow: auto; margin: 4px 0 0; }
    .ch-no-content {
      font-style: italic;
      margin-top: 5px;
    }
    .ch-raw-block pre {
      background: #0f172a;
      padding: 6px;
      margin-top: 4px;
      border-radius: 3px;
      font-size: 10px;
      max-height: 200px;
      overflow: auto;
      color: #94a3b8;
    }

    /* === v2.12.0: Usage tab === */
    .usage-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .usage-hours {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    .usage-hours:focus { outline: none; border-color: #60a5fa; }
    .usage-refresh {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 4px 9px;
      cursor: pointer;
      font-family: monospace;
      font-size: 14px;
      line-height: 1;
    }
    .usage-refresh:hover:not(:disabled) { border-color: #64748b; }
    .usage-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
    .usage-fetched {
      font-size: 10px;
      color: #64748b;
      margin-left: auto;
    }
    .usage-error {
      background: #422006;
      color: #fca5a5;
      border: 1px solid #7f1d1d;
      border-radius: 4px;
      padding: 8px;
      font-size: 11px;
    }
    .usage-error-msg {
      margin-bottom: 6px;
      word-break: break-word;
    }
    .usage-retry {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
    }
    .usage-empty {
      font-size: 11px;
      color: #64748b;
      font-style: italic;
      padding: 12px 4px;
      text-align: center;
    }

    /* Summary 4 cards in 2x2 grid */
    .usage-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 14px;
    }
    .usage-metric {
      background: #1e293b;
      border-radius: 4px;
      padding: 8px 10px;
      border-left: 2px solid #475569;
    }
    .usage-metric-label {
      font-size: 9px;
      color: #94a3b8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .usage-metric-value {
      font-size: 16px;
      font-weight: 600;
      color: #e2e8f0;
      font-family: monospace;
      line-height: 1.1;
    }
    .usage-metric-sub {
      font-size: 9px;
      color: #64748b;
      margin-top: 3px;
      font-family: monospace;
    }
    .usage-metric-cost { border-left-color: #475569; opacity: 0.6; }

    /* By-model list */
    .usage-models {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .usage-models-title {
      font-size: 10px;
      color: #94a3b8;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2px;
      cursor: help;
    }
    .usage-model-row {
      background: #1e293b;
      border-radius: 4px;
      padding: 6px 8px;
    }
    .usage-model-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 4px;
    }
    .usage-model-name {
      font-size: 11px;
      color: #e2e8f0;
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .usage-model-calls {
      font-size: 10px;
      color: #94a3b8;
      flex-shrink: 0;
    }
    .usage-bar-wrap {
      position: relative;
      height: 6px;
      background: #0f172a;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .usage-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      transition: width 200ms ease-out;
    }
    .usage-bar-total { background: #60a5fa; }
    .usage-bar-cached { background: #22d3ee; opacity: 0.85; mix-blend-mode: screen; }
    .usage-model-nums {
      display: flex;
      gap: 8px;
      font-size: 9px;
      color: #94a3b8;
      font-family: monospace;
    }

    /* === v2.15.0: Heartbeat tab === */
    .sidebar-heartbeat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hb-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .hb-interval-label {
      font-size: 10px;
      letter-spacing: 0.05em;
      color: #94a3b8;
      text-transform: uppercase;
    }
    .hb-interval-select {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 3px 6px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    .hb-interval-select:focus { outline: none; border-color: #60a5fa; }
    .hb-interval-select:disabled { opacity: 0.4; cursor: not-allowed; }
    .hb-silent-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #cbd5e1;
      cursor: pointer;
      user-select: none;
    }
    .hb-silent-toggle input { margin: 0; cursor: pointer; }
    .hb-refresh {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 3px 8px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    .hb-refresh:hover { border-color: #60a5fa; }
    .hb-refresh:disabled { opacity: 0.4; cursor: not-allowed; }
    .hb-fetched {
      font-size: 10px;
      color: #64748b;
      margin-left: auto;
      font-family: monospace;
    }
    /* 进度条 */
    .hb-progress {
      width: 100%;
      height: 2px;
      background: #1e293b;
      border-radius: 1px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .hb-progress-bar {
      height: 100%;
      width: 0;
      background: #60a5fa;
      transition: width 240ms linear;
    }
    .hb-progress-bar.hb-progress-indeterminate {
      width: 100% !important;
      background: linear-gradient(90deg, #1e293b 0%, #60a5fa 50%, #1e293b 100%);
      background-size: 200% 100%;
      animation: hb-pulse 1.1s linear infinite;
      transition: none;
    }
    @keyframes hb-pulse {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    .hb-interval-change {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: monospace;
      flex-shrink: 0;
    }
    .hb-interval-ok      { background: #064e3b; color: #6ee7b7; }
    .hb-interval-error   { background: #7f1d1d; color: #fca5a5; }
    .hb-interval-pending { background: #1e293b; color: #94a3b8; }
    .hb-error {
      font-size: 11px;
      color: #fca5a5;
      background: #7f1d1d;
      padding: 4px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .hb-empty {
      font-size: 11px;
      color: #64748b;
      font-style: italic;
      padding: 8px 4px;
    }
    .hb-logs {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .hb-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 6px 8px;
      font-family: monospace;
    }
    .hb-card-silent { opacity: 0.55; }
    .hb-card-head {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 11px;
    }
    .hb-card-agent {
      color: #e2e8f0;
      font-weight: 600;
    }
    .hb-card-ago, .hb-card-dur {
      color: #64748b;
      font-size: 10px;
    }
    .hb-state-chip {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 9px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .hb-state-chip.hb-state-busy    { background: #064e3b; color: #6ee7b7; }
    .hb-state-chip.hb-state-idle    { background: #374151; color: #d1d5db; }
    .hb-state-chip.hb-state-offline { background: #1e293b; color: #64748b; }
    .hb-card-body {
      font-size: 11px;
      color: #cbd5e1;
      margin-top: 4px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
    }
    .hb-card-body.hb-silent {
      color: #64748b;
      font-style: italic;
    }
    .hb-card-prompt-toggle {
      font-size: 10px;
      color: #60a5fa;
      cursor: pointer;
      user-select: none;
      margin-top: 4px;
    }
    .hb-card-prompt-toggle:hover { color: #93c5fd; }
    .hb-card-prompt {
      font-size: 10px;
      color: #94a3b8;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 3px;
      padding: 6px 8px;
      margin-top: 4px;
      max-height: 240px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
    }

    /* === v2.8.0: 移动端完整适配 (≤768px) ===
       - header 紧凑化 (隐藏外链, 标题缩小)
       - canvas 占满宽度, 维持 6:5 比例
       - sidebar 堆到底部, 卡片紧凑模式
       - edit toolbar 改底部抽屉
    */
    @media (max-width: 768px) {
      /* main 改纵向堆叠 */
      #pixelMain { flex-direction: column; }

      /* header 紧凑 */
      #pixelHeader {
        gap: 8px;
        padding: 6px 10px;
      }
      #pixelHeader h1 {
        font-size: 12px;
        letter-spacing: 0.03em;
      }
      #pixelHeader a {
        display: none; /* 隐藏 ← Agent Space, 节省横向空间 */
      }
      #pixelStatus {
        font-size: 10px;
      }
      #pixelBgSelect {
        font-size: 11px;
        padding: 3px 6px;
      }

      /* canvas: 占满 stage 宽度, 保持像素比例 */
      #pixelStage {
        padding: 4px;
      }
      #pixelCanvas {
        width: 100%;
        height: auto;
        max-height: 60vh;
      }

      /* sidebar 紧凑卡片 */
      #pixelSidebar {
        width: 100%;
        border-left: 0;
        border-top: 1px solid #334155;
        max-height: 28vh; /* v2.10.0: 从 40vh 收紧给 composer 让位 */
      }
      .sidebar-agents,
      .sidebar-history,
      .sidebar-usage {
        padding: 8px;
        padding-bottom: calc(8px + env(safe-area-inset-bottom));
      }
      .sidebar-history-wrap > .sidebar-history {
        padding: 8px;
        padding-top: 4px;
        padding-bottom: calc(8px + env(safe-area-inset-bottom));
      }
      .sidebar-history-toolbar {
        padding: 6px 8px 3px;
      }
      .sidebar-history-clear { font-size: 11px; padding: 5px 10px; min-height: 28px; }
      .sidebar-tab {
        font-size: 11px;
        padding: 6px 4px;
      }
      /* v2.12.0: usage grid 移动端改 1 列 (4 cards 纵排) */
      .usage-summary {
        grid-template-columns: 1fr;
        gap: 4px;
      }
      .usage-metric-value { font-size: 14px; }
      .pixel-card {
        padding: 8px 10px;
        margin-bottom: 6px;
      }
      .pixel-card-desc {
        -webkit-line-clamp: 1;
        line-clamp: 1;
      }
      .pixel-card-domains {
        display: none;
      }

      /* === v2.10.0: Composer 移动端紧凑 === */
      #pixelComposer {
        padding: 8px 10px;
        gap: 6px;
        padding-bottom: calc(8px + env(safe-area-inset-bottom));
        /* v2.11.0 (B4 mobile): 整体高度 40vh */
        max-height: 40vh;
      }
      .cc-row-controls .cc-field { font-size: 10px; }
      .cc-mode, .cc-sync, .cc-max-turns {
        font-size: 11px;
        padding: 3px 6px;
      }
      .cc-prompt {
        font-size: 12px;
        /* v2.11.0 (B1+B2 mobile): 移动端 max 120px */
        min-height: 56px;
        max-height: 120px;
      }
      .cc-step-prompt {
        max-height: 100px;
      }
      /* v2.11.0 (C3): chip hit-area 加大 */
      .cc-agent { padding: 5px 12px; font-size: 11px; min-height: 28px; }
      .cc-submit, .cc-reset {
        min-height: 32px;
        padding: 6px 12px;
      }

      /* edit toolbar 改底部抽屉 */
      #pixelEditToolbar {
        right: 0;
        left: 0;
        top: auto;
        bottom: 0;
        width: 100%;
        max-height: 60vh;
        overflow-y: auto;
        border-radius: 8px 8px 0 0;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }
      #pixelEditToolbar .me-tool-btn {
        min-height: 32px;
        padding: 6px 10px;
        font-size: 12px;
      }
      #pixelEditToolbar .me-btn {
        min-height: 36px;
        padding: 8px 4px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="pixelApp">
    <header id="pixelHeader">
      <h1>PIXEL OFFICE — ACP Bridge</h1>
      <select id="pixelBgSelect" title="Office background"></select>
      <button id="pixelStartBtn" class="active" title="Start / Pause simulation">⏸ Pause</button>
      <button id="pixelEditBtn" title="Toggle map editor">✏ Edit</button>
      <span class="spacer"></span>
      <span id="pixelStatus" data-kind="info">initializing...</span>
      <a href="/">← Agent Space</a>
    </header>

    <main id="pixelMain">
      <div id="pixelStage">
        <canvas id="pixelCanvas" width="960" height="800"></canvas>
        <aside id="pixelEditToolbar"></aside>
      </div>

      <div id="sidebarResizer"></div>
      <aside id="pixelSidebar"></aside>
    </main>

    <section id="pixelComposer"></section>
  </div>

  <script>
    // Sidebar resize handle
    (function() {
      const resizer = document.getElementById('sidebarResizer');
      const sidebar = document.getElementById('pixelSidebar');
      let startX, startW;
      resizer.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        startX = e.clientX;
        startW = sidebar.offsetWidth;
        resizer.classList.add('dragging');
        resizer.setPointerCapture(e.pointerId);
      });
      resizer.addEventListener('pointermove', (e) => {
        if (!resizer.classList.contains('dragging')) return;
        const w = startW - (e.clientX - startX);
        sidebar.style.width = Math.max(200, Math.min(w, window.innerWidth * 0.7)) + 'px';
      });
      resizer.addEventListener('pointerup', (e) => {
        resizer.classList.remove('dragging');
        resizer.releasePointerCapture(e.pointerId);
      });
    })();
  </script>
  <script type="module" src="/src/pixel/pixel-main.js"></script>
</body>
</html>
