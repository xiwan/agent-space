<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pixel Office — ACP Bridge Agents</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    #pixelApp {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh; /* iOS Safari: 排除浏览器工具栏的动态视口 */
    }

    #pixelHeader {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      font-size: 13px;
      flex-shrink: 0;
    }

    #pixelHeader h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    #pixelHeader .spacer { flex: 1; }

    #pixelHeader a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 12px;
    }

    #pixelBgSelect {
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    #pixelBgSelect:hover { border-color: #64748b; }
    #pixelBgSelect:focus { outline: none; border-color: #60a5fa; }

    /* === v2.4.0: edit button + toolbar === */
    #pixelEditBtn,
    #pixelStartBtn {
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 4px 10px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    #pixelEditBtn:hover, #pixelStartBtn:hover { border-color: #64748b; }
    #pixelEditBtn.active {
      background: #facc15;
      color: #000;
      border-color: #facc15;
    }
    /* v2.5.0: Pause 状态视觉 (running 时按钮显示 "⏸ Pause" + 绿色) */
    #pixelStartBtn.active {
      background: #34d399;
      color: #000;
      border-color: #34d399;
    }

    #pixelEditToolbar {
      display: none;
      position: absolute;
      right: 16px;
      top: 16px;
      width: 260px;
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 12px;
      font-family: monospace;
      font-size: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      z-index: 20;
    }
    #pixelEditToolbar .me-title {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #facc15;
      margin-bottom: 10px;
    }
    #pixelEditToolbar .me-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    #pixelEditToolbar .me-label {
      font-size: 10px;
      color: #94a3b8;
      width: 50px;
      text-transform: uppercase;
    }
    #pixelEditToolbar .me-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1;
    }
    #pixelEditToolbar .me-tool-btn {
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 3px;
      padding: 3px 6px;
      cursor: pointer;
      font-size: 11px;
      font-family: monospace;
    }
    #pixelEditToolbar .me-tool-btn:hover { border-color: #64748b; }
    #pixelEditToolbar .me-tool-btn.active {
      background: #60a5fa;
      color: #000;
      border-color: #60a5fa;
    }
    /* v2.4.1: eraser 视觉与 paint 区分 */
    #pixelEditToolbar .me-tool-btn[data-tool="eraser"].active {
      background: #fda4af;
      color: #000;
      border-color: #fda4af;
    }
    #pixelEditToolbar .me-agent {
      flex: 1;
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 3px;
      padding: 3px 6px;
      font-family: monospace;
      font-size: 11px;
    }
    #pixelEditToolbar .me-actions {
      display: flex;
      gap: 4px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    #pixelEditToolbar .me-btn {
      flex: 1;
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 3px;
      padding: 5px 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
    }
    #pixelEditToolbar .me-btn:hover { border-color: #64748b; }
    #pixelEditToolbar .me-save:hover { background: #064e3b; }
    #pixelEditToolbar .me-reset:hover { background: #7f1d1d; }
    #pixelEditToolbar .me-hint {
      font-size: 10px;
      color: #64748b;
      margin-top: 8px;
      text-align: center;
    }

    #pixelStatus {
      font-size: 12px;
      color: #94a3b8;
      font-family: monospace;
    }
    #pixelStatus[data-kind="ok"]    { color: #34d399; }
    #pixelStatus[data-kind="error"] { color: #f87171; }

    /* === main: 横向 flex (canvas + sidebar) === */
    #pixelMain {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #pixelStage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f1c;
      overflow: hidden;
      position: relative;  /* v2.4.0: anchor for #pixelEditToolbar absolute */
    }

    #pixelCanvas {
      max-width: 100%;
      max-height: 100%;
      width: 960px;
      height: 800px;
      aspect-ratio: 6 / 5;  /* v2.8.0: 窄屏缩放时维持原比例 */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: pointer;
      box-shadow: 0 0 0 1px #334155, 0 8px 32px rgba(0,0,0,0.5);
    }

    /* === sidebar: 320px 卡片列表 === */
    #pixelSidebar {
      width: 320px;
      background: #0f172a;
      border-left: 1px solid #334155;
      overflow-y: auto;
      padding: 12px;
      flex-shrink: 0;
    }

    #pixelSidebar h2 {
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    .pixel-card {
      padding: 10px 12px;
      margin-bottom: 8px;
      background: #1e293b;
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 100ms, background 100ms;
    }
    .pixel-card:hover { background: #283548; }
    .pixel-card.selected {
      border-color: #fff;
      box-shadow: 0 0 0 1px #fff inset;
    }
    .pixel-card.offline { opacity: 0.5; }

    .pixel-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .pixel-card-name {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      word-break: break-all;
    }
    .pixel-card-desc {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-clamp: 2;
      overflow: hidden;
      line-height: 1.4;
    }
    .pixel-card-domains {
      font-size: 10px;
      color: #64748b;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* state badge — 复用 v2.1.0 配色 */
    .pixel-state {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .pixel-state-busy    { background: #064e3b; color: #6ee7b7; }
    .pixel-state-idle    { background: #374151; color: #d1d5db; }
    .pixel-state-offline { background: #1e293b; color: #64748b; }
    .pixel-state-error   { background: #7f1d1d; color: #fca5a5; }

    /* === v2.8.0: 移动端完整适配 (≤768px) ===
       - header 紧凑化 (隐藏外链, 标题缩小)
       - canvas 占满宽度, 维持 6:5 比例
       - sidebar 堆到底部, 卡片紧凑模式
       - edit toolbar 改底部抽屉
    */
    @media (max-width: 768px) {
      /* main 改纵向堆叠 */
      #pixelMain { flex-direction: column; }

      /* header 紧凑 */
      #pixelHeader {
        gap: 8px;
        padding: 6px 10px;
      }
      #pixelHeader h1 {
        font-size: 12px;
        letter-spacing: 0.03em;
      }
      #pixelHeader a {
        display: none; /* 隐藏 ← Agent Space, 节省横向空间 */
      }
      #pixelStatus {
        font-size: 10px;
      }
      #pixelBgSelect {
        font-size: 11px;
        padding: 3px 6px;
      }

      /* canvas: 占满 stage 宽度, 保持像素比例 */
      #pixelStage {
        padding: 4px;
      }
      #pixelCanvas {
        width: 100%;
        height: auto;
        max-height: 60vh;
      }

      /* sidebar 紧凑卡片 */
      #pixelSidebar {
        width: 100%;
        border-left: 0;
        border-top: 1px solid #334155;
        max-height: 40vh;
        padding: 8px;
        padding-bottom: calc(8px + env(safe-area-inset-bottom));
      }
      .pixel-card {
        padding: 8px 10px;
        margin-bottom: 6px;
      }
      .pixel-card-desc {
        -webkit-line-clamp: 1;
        line-clamp: 1;
      }
      .pixel-card-domains {
        display: none; /* 移动端信息密度优先 */
      }

      /* edit toolbar 改底部抽屉 */
      #pixelEditToolbar {
        right: 0;
        left: 0;
        top: auto;
        bottom: 0;
        width: 100%;
        max-height: 60vh;
        overflow-y: auto;
        border-radius: 8px 8px 0 0;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }
      #pixelEditToolbar .me-tool-btn {
        min-height: 32px;
        padding: 6px 10px;
        font-size: 12px;
      }
      #pixelEditToolbar .me-btn {
        min-height: 36px;
        padding: 8px 4px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="pixelApp">
    <header id="pixelHeader">
      <h1>PIXEL OFFICE — ACP Bridge</h1>
      <select id="pixelBgSelect" title="Office background"></select>
      <button id="pixelStartBtn" title="Start / Pause simulation">▶ Start</button>
      <button id="pixelEditBtn" title="Toggle map editor">✏ Edit</button>
      <span class="spacer"></span>
      <span id="pixelStatus" data-kind="info">initializing...</span>
      <a href="/">← Agent Space</a>
    </header>

    <main id="pixelMain">
      <div id="pixelStage">
        <canvas id="pixelCanvas" width="960" height="800"></canvas>
        <aside id="pixelEditToolbar"></aside>
      </div>

      <aside id="pixelSidebar">
        <h2>AGENTS</h2>
        <div id="pixelSidebarCards"></div>
      </aside>
    </main>
  </div>

  <script type="module" src="/src/pixel/pixel-main.js"></script>
</body>
</html>
