<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pixel Office — ACP Bridge Agents</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    #pixelApp {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #pixelHeader {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      font-size: 13px;
      flex-shrink: 0;
    }

    #pixelHeader h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    #pixelHeader .spacer { flex: 1; }

    #pixelHeader a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 12px;
    }

    #pixelBgSelect {
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    #pixelBgSelect:hover { border-color: #64748b; }
    #pixelBgSelect:focus { outline: none; border-color: #60a5fa; }

    #pixelStatus {
      font-size: 12px;
      color: #94a3b8;
      font-family: monospace;
    }
    #pixelStatus[data-kind="ok"]    { color: #34d399; }
    #pixelStatus[data-kind="error"] { color: #f87171; }

    /* === main: 横向 flex (canvas + sidebar) === */
    #pixelMain {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #pixelStage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f1c;
      overflow: hidden;
    }

    #pixelCanvas {
      max-width: 100%;
      max-height: 100%;
      width: 960px;
      height: 800px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: pointer;
      box-shadow: 0 0 0 1px #334155, 0 8px 32px rgba(0,0,0,0.5);
    }

    /* === sidebar: 320px 卡片列表 === */
    #pixelSidebar {
      width: 320px;
      background: #0f172a;
      border-left: 1px solid #334155;
      overflow-y: auto;
      padding: 12px;
      flex-shrink: 0;
    }

    #pixelSidebar h2 {
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    .pixel-card {
      padding: 10px 12px;
      margin-bottom: 8px;
      background: #1e293b;
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 100ms, background 100ms;
    }
    .pixel-card:hover { background: #283548; }
    .pixel-card.selected {
      border-color: #fff;
      box-shadow: 0 0 0 1px #fff inset;
    }
    .pixel-card.offline { opacity: 0.5; }

    .pixel-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .pixel-card-name {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      word-break: break-all;
    }
    .pixel-card-desc {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-clamp: 2;
      overflow: hidden;
      line-height: 1.4;
    }
    .pixel-card-domains {
      font-size: 10px;
      color: #64748b;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* state badge — 复用 v2.1.0 配色 */
    .pixel-state {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .pixel-state-busy    { background: #064e3b; color: #6ee7b7; }
    .pixel-state-idle    { background: #374151; color: #d1d5db; }
    .pixel-state-offline { background: #1e293b; color: #64748b; }
    .pixel-state-error   { background: #7f1d1d; color: #fca5a5; }

    /* === 移动端简化: sidebar 堆到底部, 高度自适应 === */
    @media (max-width: 768px) {
      #pixelMain { flex-direction: column; }
      #pixelSidebar {
        width: 100%;
        border-left: 0;
        border-top: 1px solid #334155;
        max-height: 40vh;
      }
    }
  </style>
</head>
<body>
  <div id="pixelApp">
    <header id="pixelHeader">
      <h1>PIXEL OFFICE — ACP Bridge</h1>
      <select id="pixelBgSelect" title="Office background"></select>
      <span class="spacer"></span>
      <span id="pixelStatus" data-kind="info">initializing...</span>
      <a href="/">← Agent Space</a>
    </header>

    <main id="pixelMain">
      <div id="pixelStage">
        <canvas id="pixelCanvas" width="960" height="800"></canvas>
      </div>

      <aside id="pixelSidebar">
        <h2>AGENTS</h2>
        <div id="pixelSidebarCards"></div>
      </aside>
    </main>
  </div>

  <script type="module" src="/src/pixel/pixel-main.js"></script>
</body>
</html>
