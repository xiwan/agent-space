<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Tileset Atlas Validator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: monospace; padding: 16px; display: flex; gap: 16px; height: 100vh; }
    .panel { border: 1px solid #30363d; border-radius: 8px; padding: 12px; overflow: hidden; display: flex; flex-direction: column; }
    .panel h3 { font-size: 13px; color: #4ade80; margin-bottom: 8px; flex-shrink: 0; }
    #left { width: 260px; flex-shrink: 0; }
    #right { flex: 1; }
    #sprite-list { flex: 1; overflow-y: auto; font-size: 11px; line-height: 1.8; }
    #sprite-list .item { cursor: pointer; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
    #sprite-list .item:hover { background: #30363d; }
    #sprite-list .item.active { background: #4ade80; color: #000; }
    #filter { width: 100%; padding: 4px 8px; background: #0d1117; border: 1px solid #30363d; color: #e0e0e0; font-family: monospace; font-size: 12px; border-radius: 4px; margin-bottom: 8px; }
    #grid-view { flex: 1; overflow: auto; }
    #grid-canvas { image-rendering: pixelated; }
    .controls { display: flex; gap: 8px; margin-bottom: 8px; font-size: 11px; flex-shrink: 0; }
    .controls label { display: flex; align-items: center; gap: 4px; }
    .controls select { background: #0d1117; color: #e0e0e0; border: 1px solid #30363d; padding: 2px 4px; font-size: 11px; border-radius: 3px; }
    #info { font-size: 12px; color: #888; margin-top: 8px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="left" class="panel">
    <h3>Sprites</h3>
    <input id="filter" type="text" placeholder="Filter... (desk, chair, bed)" />
    <div id="sprite-list"></div>
    <div id="info"></div>
    <div id="rename-box" style="display:none; margin-top:8px;">
      <input id="rename-input" type="text" style="width:100%; padding:4px 8px; background:#0d1117; border:1px solid #4ade80; color:#e0e0e0; font-family:monospace; font-size:12px; border-radius:4px;" />
      <div style="font-size:10px; color:#666; margin-top:4px;">Enter 确认 / Esc 取消</div>
    </div>
    <div id="batch-box" style="margin-top:8px; font-size:11px;">
      <div style="color:#888; margin-bottom:4px;">已选 <span id="sel-count">0</span> 个 (Shift+点击多选)</div>
      <input id="batch-input" type="text" placeholder="新前缀 (如 chair_green)" style="width:100%; padding:4px 8px; background:#0d1117; border:1px solid #30363d; color:#e0e0e0; font-family:monospace; font-size:12px; border-radius:4px;" />
      <button id="batch-btn" style="margin-top:4px; padding:4px 8px; background:#30363d; color:#facc15; border:1px solid #facc15; font-family:monospace; font-size:11px; border-radius:4px; cursor:pointer; width:100%;">批量重命名 (前缀_00, _01...)</button>
    </div>
    <button id="export-btn" style="margin-top:8px; padding:6px; background:#30363d; color:#4ade80; border:1px solid #4ade80; font-family:monospace; font-size:11px; border-radius:4px; cursor:pointer; width:100%;">导出 JSON</button>
  </div>
  <div id="right" class="panel">
    <div class="controls">
      <label>Scale: <select id="scale-select">
        <option value="1">1x</option>
        <option value="2" selected>2x</option>
        <option value="3">3x</option>
      </select></label>
      <label><input type="checkbox" id="show-grid" /> Grid</label>
    </div>
    <div id="grid-view">
      <canvas id="grid-canvas"></canvas>
    </div>
  </div>

  <script>
    let atlas, tilesetImg, offscreen, selectedSprite = null;
    let multiSelect = new Set();

    async function init() {
      atlas = await fetch('assets/rpg_atlas.json').then(r => r.json());
      tilesetImg = new Image();
      tilesetImg.src = 'design/RPG_MAKER_XP/0_Everything_2.png';
      await new Promise(r => tilesetImg.onload = r);

      offscreen = document.createElement('canvas');
      offscreen.width = tilesetImg.width;
      offscreen.height = atlas.contentHeight;
      offscreen.getContext('2d').drawImage(tilesetImg, 0, 0);

      document.getElementById('sprite-list').innerHTML = buildList('');
      document.getElementById('sprite-list').addEventListener('click', e => {
        const item = e.target.closest('.item');
        if (!item) return;
        if (e.shiftKey) {
          const name = item.dataset.name;
          if (multiSelect.has(name)) multiSelect.delete(name); else multiSelect.add(name);
          item.classList.toggle('active');
          document.getElementById('sel-count').textContent = multiSelect.size;
        } else {
          multiSelect.clear();
          selectSprite(item.dataset.name);
          document.getElementById('sel-count').textContent = '0';
        }
        renderGrid();
      });
      document.getElementById('filter').addEventListener('input', e => {
        document.getElementById('sprite-list').innerHTML = buildList(e.target.value);
      });
      document.getElementById('rename-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') { renameSprite(selectedSprite, e.target.value.trim()); }
        if (e.key === 'Escape') { document.getElementById('rename-box').style.display = 'none'; }
      });
      document.getElementById('batch-btn').addEventListener('click', batchRename);
      document.getElementById('export-btn').addEventListener('click', () => {
        const json = JSON.stringify(atlas, null, 2);
        const blob = new Blob([json], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'rpg_atlas.json';
        a.click();
      });
      document.getElementById('scale-select').addEventListener('change', renderGrid);
      document.getElementById('show-grid').addEventListener('change', renderGrid);
      document.getElementById('grid-view').addEventListener('scroll', renderGrid);
      renderGrid();
    }

    function buildList(filter) {
      const f = filter.toLowerCase();
      let html = '';
      for (const name of Object.keys(atlas.sprites)) {
        if (f && !name.includes(f)) continue;
        const s = atlas.sprites[name];
        html += `<div class="item${name === selectedSprite ? ' active' : ''}" data-name="${name}">${name} <span style="color:#666">${s.w}×${s.h}</span></div>`;
      }
      return html;
    }

    function selectSprite(name) {
      selectedSprite = name;
      document.querySelectorAll('#sprite-list .item').forEach(el => el.classList.toggle('active', el.dataset.name === name));
      const s = atlas.sprites[name];
      document.getElementById('info').textContent = `${name}: ${s.w}×${s.h} @ (${s.x}, ${s.y})`;
      // Show rename box
      const box = document.getElementById('rename-box');
      const input = document.getElementById('rename-input');
      box.style.display = 'block';
      input.value = name;
      input.focus();
      input.select();

      const scale = parseInt(document.getElementById('scale-select').value);
      const view = document.getElementById('grid-view');
      view.scrollTop = s.y * scale - view.clientHeight / 3;
      renderGrid();
    }

    function renameSprite(oldName, newName) {
      if (!newName || newName === oldName || !atlas.sprites[oldName]) return;
      if (atlas.sprites[newName]) { alert('名字已存在'); return; }
      atlas.sprites[newName] = atlas.sprites[oldName];
      delete atlas.sprites[oldName];
      selectedSprite = newName;
      document.getElementById('sprite-list').innerHTML = buildList(document.getElementById('filter').value);
      document.getElementById('info').textContent = `已重命名: ${oldName} → ${newName}`;
      renderGrid();
    }

    function batchRename() {
      const prefix = document.getElementById('batch-input').value.trim();
      if (!prefix) return;
      if (multiSelect.size === 0) { alert('先 Shift+点击选中多个 sprite'); return; }
      // Sort by position for consistent numbering
      const sorted = [...multiSelect].sort((a, b) => {
        const sa = atlas.sprites[a], sb = atlas.sprites[b];
        return sa.y - sb.y || sa.x - sb.x;
      });
      sorted.forEach((oldName, i) => {
        const newName = `${prefix}_${String(i).padStart(2, '0')}`;
        if (atlas.sprites[newName] && !multiSelect.has(newName)) return; // skip conflict
        atlas.sprites[newName] = atlas.sprites[oldName];
        delete atlas.sprites[oldName];
      });
      multiSelect.clear();
      document.getElementById('sel-count').textContent = '0';
      document.getElementById('sprite-list').innerHTML = buildList(document.getElementById('filter').value);
      document.getElementById('info').textContent = `批量重命名 ${sorted.length} 个 → ${prefix}_00...`;
      renderGrid();
    }

    function renderGrid() {
      const scale = parseInt(document.getElementById('scale-select').value);
      const showGrid = document.getElementById('show-grid').checked;
      const canvas = document.getElementById('grid-canvas');
      const contentH = atlas.contentHeight;
      canvas.width = offscreen.width * scale;
      canvas.height = contentH * scale;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(offscreen, 0, 0, offscreen.width, contentH, 0, 0, canvas.width, canvas.height);

      if (showGrid) {
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 0.5;
        const cellS = 32 * scale;
        for (let x = 0; x <= canvas.width; x += cellS) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
        for (let y = 0; y <= canvas.height; y += cellS) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
      }

      // Only draw boxes in visible area
      const view = document.getElementById('grid-view');
      const yMin = view.scrollTop / scale - 20;
      const yMax = (view.scrollTop + view.clientHeight) / scale + 20;

      for (const [name, s] of Object.entries(atlas.sprites)) {
        if (s.y + s.h < yMin || s.y > yMax) continue;
        const sel = name === selectedSprite;
        const multi = multiSelect.has(name);
        ctx.strokeStyle = sel ? '#ff0' : multi ? '#f0f' : 'rgba(74,222,128,0.5)';
        ctx.lineWidth = sel ? 3 : multi ? 2 : 0.7;
        ctx.strokeRect(s.x * scale, s.y * scale, s.w * scale, s.h * scale);
        if (sel || multi) {
          ctx.fillStyle = sel ? 'rgba(255,255,0,0.1)' : 'rgba(255,0,255,0.1)';
          ctx.fillRect(s.x * scale, s.y * scale, s.w * scale, s.h * scale);
        }
        if (sel) {
          ctx.font = `bold ${11 * scale}px monospace`;
          ctx.fillStyle = '#ff0';
          ctx.fillText(name, s.x * scale, s.y * scale - 4);
        }
      }
    }

    init();
  </script>
</body>
</html>
