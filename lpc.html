<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACP Agent Space — LPC Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
    #game-container { width: 100%; max-width: 960px; aspect-ratio: 4/3; }
    #setup { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
    #setup.hidden { display: none; }
    #setup form { background: #16213e; padding: 24px; border-radius: 8px; border: 2px solid #333; width: 340px; }
    #setup h2 { color: #7fdbca; margin-bottom: 16px; font-size: 16px; }
    #setup label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
    #setup input { width: 100%; padding: 8px; margin-bottom: 12px; background: #0f0f23; border: 1px solid #444; color: #e0e0e0; font-family: monospace; font-size: 13px; border-radius: 4px; }
    #setup button { width: 100%; padding: 8px; background: #4ade80; color: #000; border: none; font-family: monospace; font-weight: bold; font-size: 13px; cursor: pointer; border-radius: 4px; }
    #setup .skip-btn { margin-top: 8px; background: transparent; color: #666; border: 1px solid #444; }
    #setup .skip-btn:hover { color: #aaa; border-color: #666; }
  </style>
</head>
<body>
  <div id="setup">
    <form id="setup-form">
      <h2>🏢 Agent Space (LPC)</h2>
      <label for="bridge-url">Bridge URL</label>
      <input id="bridge-url" type="text" placeholder="http://localhost:18010" />
      <label for="bridge-token">Auth Token</label>
      <input id="bridge-token" type="password" placeholder="Bearer token" />
      <button type="submit">Connect</button>
      <button type="button" class="skip-btn" id="skip-btn">Skip (use defaults)</button>
    </form>
  </div>
  <div id="game-container"></div>
  <script>
    (function() {
      const saved = JSON.parse(localStorage.getItem('agent-space-config') || '{}');
      const urlInput = document.getElementById('bridge-url');
      const tokenInput = document.getElementById('bridge-token');
      const setup = document.getElementById('setup');

      if (saved.bridgeUrl) urlInput.value = saved.bridgeUrl;
      if (saved.authToken) tokenInput.value = saved.authToken;

      if (saved.bridgeUrl && saved.authToken) {
        setup.classList.add('hidden');
      }

      document.getElementById('setup-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const config = { bridgeUrl: urlInput.value.trim() || '/api', authToken: tokenInput.value.trim() };
        localStorage.setItem('agent-space-config', JSON.stringify(config));
        setup.classList.add('hidden');
      });

      document.getElementById('skip-btn').addEventListener('click', () => {
        setup.classList.add('hidden');
      });
    })();
  </script>
  <script type="module" src="/src/lpc-game.js"></script>
</body>
</html>
